<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ユミエラ神人语录集</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="site">
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__head">
          <p class="eyebrow">Quote Index</p>
          <h1>ユミエラ神人语录集</h1>
          <p class="sidebar__text">随机展示、按卷浏览、支持分享单条。</p>
        </div>

        <div class="sidebar__section">
          <label class="label" for="volumeFilter">卷号</label>
          <select id="volumeFilter" class="select"></select>
        </div>

        <div class="sidebar__section">
          <label class="label" for="searchInput">搜索</label>
          <input id="searchInput" class="input" type="search" placeholder="搜中文、日文、卷号、页号" />
        </div>

        <div class="sidebar__section">
          <div class="section__title">
            <span>目录</span>
            <span id="quoteCount" class="muted"></span>
          </div>
          <nav id="quoteList" class="quote-list" aria-label="语录目录"></nav>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuButton" class="button button--ghost" type="button" aria-expanded="false" aria-controls="sidebar">
            目录
          </button>
          <div class="topbar__actions">
            <button id="randomButton" class="button" type="button">随机一条</button>
            <button id="imageButton" class="button button--ghost" type="button">生成图片</button>
            <button id="copyLinkButton" class="button button--ghost" type="button">复制链接</button>
          </div>
        </header>

        <section class="hero">
          <article class="quote-card" id="quoteCard" aria-live="polite">
            <div class="quote-card__meta">
              <span id="metaVolume">卷 -</span>
              <span id="metaPage">页 -</span>
            </div>
            <div class="quote-card__body">
              <section class="quote-block">
                <div class="quote-block__head">
                  <span class="quote-block__label">原文</span>
                  <button id="copyJpButton" class="icon-button" type="button" aria-label="复制日文原文" title="复制日文原文">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="9" y="9" width="10" height="10" rx="2"></rect>
                      <rect x="5" y="5" width="10" height="10" rx="2"></rect>
                    </svg>
                  </button>
                </div>
                <p class="quote-card__jp" id="quoteJp">加载中...</p>
              </section>
              <section class="quote-block quote-block--primary">
                <div class="quote-block__head">
                  <span class="quote-block__label">译文</span>
                  <button id="copyZhButton" class="icon-button" type="button" aria-label="复制中文译文" title="复制中文译文">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="9" y="9" width="10" height="10" rx="2"></rect>
                      <rect x="5" y="5" width="10" height="10" rx="2"></rect>
                    </svg>
                  </button>
                </div>
                <p class="quote-card__zh" id="quoteZh"></p>
              </section>
            </div>
          </article>
        </section>
      </main>
    </div>

    <div id="backdrop" class="backdrop" hidden></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
